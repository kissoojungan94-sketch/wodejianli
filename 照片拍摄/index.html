<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照片拍摄 — 作品展示</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #F9F3EE;
            color: #2C2C2C;
            padding: 40px 24px;
        }
        h1 { font-size: 24px; margin-bottom: 8px; }
        .sub { font-size: 14px; color: #8A8A8A; margin-bottom: 32px; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .gallery .item {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .gallery .item img {
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            display: block;
        }
        .back {
            display: inline-block;
            margin-top: 32px;
            color: #D4A89E;
            text-decoration: none;
            font-weight: 600;
        }
        .back:hover { color: #C48E82; }
    </style>
</head>
<body>
    <h1>照片拍摄 — 照片精选</h1>
    <p class="sub">工作及日常摄影作品</p>
    <div class="gallery">
        <div class="item"><img src="1.jpeg" alt="照片1" loading="lazy"></div>
        <div class="item"><img src="2.jpeg" alt="照片2" loading="lazy"></div>
        <div class="item"><img src="3.jpg" alt="照片3" loading="lazy"></div>
        <div class="item"><img src="4.jpg" alt="照片4" loading="lazy"></div>
        <div class="item"><img src="5.jpg" alt="照片5" loading="lazy"></div>
        <div class="item"><img src="6.jpeg" alt="照片6" loading="lazy"></div>
        <div class="item"><img src="7.jpg" alt="照片7" loading="lazy"></div>
        <div class="item"><img src="8.jpg" alt="照片8" loading="lazy"></div>
        <div class="item"><img src="9.jpg" alt="照片9" loading="lazy"></div>
    </div>
    <a class="back" href="../index.html">← 返回简历</a>
</body>
</html>
